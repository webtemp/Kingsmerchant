name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt · clippy · test · doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # The overlay crate links against Wayland / EGL / xkbcommon; the rest of
      # the workspace is pure Rust (rustls, no OpenSSL).
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libwayland-dev libxkbcommon-dev libegl-dev libgl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Formatting
        run: cargo fmt --all --check

      - name: Clippy (warnings are errors)
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Tests
        run: cargo test --workspace --locked

      - name: Docs (broken intra-doc links are errors)
        run: cargo doc --workspace --no-deps --locked
        env:
          RUSTDOCFLAGS: -D warnings

  msrv:
    name: MSRV (1.96)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libwayland-dev libxkbcommon-dev libegl-dev libgl-dev

      - name: Install Rust 1.96 (declared MSRV)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check --workspace --locked
