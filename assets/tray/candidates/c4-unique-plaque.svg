<?xml version="1.0" encoding="UTF-8"?>
<!-- Candidate 4: "Unique Item Plaque" — the ornate beveled item-label frame
     (Unique-rarity gold/brown), matching the app's rarity-framed previews. -->
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="frame4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e6c25a"/><stop offset="0.5" stop-color="#b07d2a"/><stop offset="1" stop-color="#7a521a"/>
    </linearGradient>
    <linearGradient id="inner4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2c2620"/><stop offset="1" stop-color="#171410"/>
    </linearGradient>
  </defs>
  <!-- outer beveled frame -->
  <rect x="24" y="56" width="208" height="144" rx="20" fill="url(#frame4)"/>
  <rect x="34" y="66" width="188" height="124" rx="14" fill="url(#inner4)"/>
  <!-- corner studs -->
  <g fill="#f3dd8e">
    <circle cx="52" cy="84"  r="6"/><circle cx="204" cy="84"  r="6"/>
    <circle cx="52" cy="172" r="6"/><circle cx="204" cy="172" r="6"/>
  </g>
  <!-- flourish lines above/below text (unique-item header divider) -->
  <g stroke="#c79a3e" stroke-width="3" opacity="0.8">
    <line x1="70" y1="96"  x2="186" y2="96"/>
    <line x1="70" y1="160" x2="186" y2="160"/>
  </g>
  <!-- DDD in unique-orange caps -->
  <text x="128" y="150" text-anchor="middle" font-family="'Trajan Pro', Georgia, serif"
        font-size="62" font-weight="700" letter-spacing="4" fill="#d8a24a">DDD</text>
</svg>
