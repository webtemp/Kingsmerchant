<?xml version="1.0" encoding="UTF-8"?>
<!-- poe2ddd icon. The name's accent is on the "ddd": three geometric lowercase
     d's in gold on a dark rounded badge. Font-independent (the letters are
     drawn as shapes) so it rasterises identically on any system. -->
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0d27a"/>
      <stop offset="0.55" stop-color="#d6a93f"/>
      <stop offset="1" stop-color="#a9781f"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34363f"/>
      <stop offset="1" stop-color="#23242b"/>
    </linearGradient>
    <!-- One geometric lowercase "d": a tall stem + a ringed bowl. The counter
         is filled with the badge colour so it reads as a hole. -->
    <g id="dee">
      <circle cx="38" cy="118" r="32" fill="url(#gold)"/>
      <rect x="52" y="0" width="18" height="150" rx="9" fill="url(#gold)"/>
      <circle cx="37" cy="118" r="14" fill="#26272e"/>
    </g>
  </defs>

  <!-- Dark rounded badge with a thin gold rim. -->
  <rect x="14" y="14" width="228" height="228" rx="52" ry="52"
        fill="url(#card)" stroke="#caa23c" stroke-width="5"/>

  <!-- ddd -->
  <g transform="translate(17,53)">
    <use href="#dee" x="0"   y="0"/>
    <use href="#dee" x="76"  y="0"/>
    <use href="#dee" x="152" y="0"/>
  </g>
</svg>
